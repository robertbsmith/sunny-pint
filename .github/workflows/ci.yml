name: CI

# Catch TypeScript + Biome regressions before they reach main.
# Deliberately not running the full pipeline here — that needs huge LiDAR
# data files and ~1 hour of compute, neither fit for CI. This gate is
# about frontend + Functions + scripts code correctness only.

on:
  pull_request:
  push:
    branches: [main]

# Cancel older in-flight runs for the same branch on a new push so the
# queue doesn't back up during rapid iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Uses the `packageManager` field in package.json to pin the version.

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src + scripts + functions + pipeline/ts)
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Lint Python (ruff)
        # Catches the class of bug that broke Scotland/Wales for weeks:
        # an undefined name (`gpkg_path` vs `GPKG_PATH`) shipped because
        # the only check was runtime. Ruff's static analysis runs in
        # under a second and would have caught it.
        uses: astral-sh/ruff-action@v3
        with:
          args: check pipeline scripts

      - name: Build (Vite)
        # A passing typecheck doesn't prove the site actually builds —
        # bundler config or plugin issues can still fail the production
        # build. Runs after typecheck so failures point at the cheapest
        # diagnosis first.
        run: pnpm build
