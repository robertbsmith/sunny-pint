name: Deploy Email Worker

# Auto-deploys the email-sending Worker when its source changes on main.
# Requires a CLOUDFLARE_API_TOKEN secret with Workers write permission and
# CLOUDFLARE_ACCOUNT_ID set in the repository settings.

on:
  push:
    branches: [main]
    paths:
      - "email-worker/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: email-worker
        run: npm ci
      - name: Deploy to Cloudflare
        working-directory: email-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
