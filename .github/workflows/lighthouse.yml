name: Lighthouse

# Audits the live production site after each push to main and asserts that
# SEO / performance / accessibility scores stay within target. Catches
# regressions automatically before they have time to hurt search rankings.
#
# Runs against the production URL because we don't have a per-PR preview
# URL configured. Cloudflare Pages takes ~2 minutes to deploy after a push,
# so we wait then run.
#
# To bypass on a single push, use [skip lighthouse] in the commit message.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    if: "!contains(github.event.head_commit.message, '[skip lighthouse]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the lighthouserc.json)
        uses: actions/checkout@v4

      - name: Wait for Cloudflare Pages deploy to complete
        # Cloudflare typically deploys in ~30 seconds, plus a small buffer
        # for global edge propagation.
        run: sleep 60

      - name: Audit production URLs with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://sunny-pint.co.uk/
            https://sunny-pint.co.uk/norwich/
            https://sunny-pint.co.uk/norwich/sunniest/
            https://sunny-pint.co.uk/pub/the-racecourse-norwich/
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Quality gates — see lighthouserc.json at the repo root for
          # the assertion thresholds. lhci auto-discovers it.
          configPath: ./lighthouserc.json
