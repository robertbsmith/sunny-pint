<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="description" content="Find sunny beer garden seats — real-time shadow maps for UK pubs" />
    <meta property="og:title" content="Sunny Pint" />
    <meta property="og:description" content="Find sunny beer garden seats — real-time shadow maps for UK pubs" />
    <meta property="og:image" content="https://sunny-pint.co.uk/banner.png" />
    <meta property="og:url" content="https://sunny-pint.co.uk" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Sunny Pint</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="app">

      <!-- Header -->
      <header id="header">
        <div class="header-inner">
          <div class="header-left">
            <button id="btn-locate" title="Use GPS location"></button>
            <span id="location-label">Loading...</span>
            <button id="btn-search" title="Search location"></button>
          </div>
          <div class="header-right">
            <span class="brand">Sunny Pint</span>
            <button id="btn-theme" title="Toggle theme"></button>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main id="main">
        <!-- Porthole + controls -->
        <section id="viz">
          <div id="circle-wrap">
            <canvas id="circle-canvas"></canvas>
          </div>
          <div id="arc-wrap">
            <canvas id="arc-canvas" height="110"></canvas>
            <div class="arc-controls">
              <div class="arc-left">
                <button id="btn-play">
                  <span id="play-icon"></span>
                </button>
                <span id="time-display">12:00</span>
              </div>
              <div class="arc-right">
                <span id="weather-badge" class="weather-badge"></span>
                <button id="btn-share" title="Share"></button>
                <button id="btn-directions" title="Get directions"></button>
                <button id="btn-date">Today</button>
              </div>
              <input type="date" id="date-input" />
          </div>
        </section>

        <!-- Pub list -->
        <section id="pubs">
          <div class="search-wrap">
            <span id="search-icon"></span>
            <input id="pub-search" type="search" placeholder="Search pubs..." />
          </div>
          <ul id="pub-list"></ul>
        </section>
      </main>

      <!-- Footer -->
      <footer id="footer">
        <div class="footer-attr">
          Data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> (ODbL),
          <a href="https://www.gov.uk/government/organisations/environment-agency">EA LiDAR</a>,
          <a href="https://use-land-property-data.service.gov.uk/">Land Registry</a>,
          <a href="https://ratings.food.gov.uk/">FSA</a> (OGL v3),
          <a href="https://carto.com/attributions">CARTO</a> (CC BY 3.0),
          <a href="https://github.com/mourner/suncalc">SunCalc</a>,
          <a href="https://azgaar.github.io/Armoria/">Armoria</a>
        </div>
      </footer>

    </div>

    <!-- Fullscreen circle overlay -->
    <div id="circle-fullscreen">
      <canvas id="circle-canvas-big"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
