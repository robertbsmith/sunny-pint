<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="description" content="Find sunny beer garden seats — real-time shadow maps for UK pubs" />
    <meta property="og:title" content="Sunny Pint" />
    <meta property="og:description" content="Find sunny beer garden seats — real-time shadow maps for UK pubs" />
    <meta property="og:image" content="https://sunny-pint.co.uk/banner.png" />
    <meta property="og:url" content="https://sunny-pint.co.uk" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Sunny Pint</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="app">

      <!-- Header -->
      <header id="header">
        <div class="header-inner">
          <a href="/" class="brand">
            <img src="/icon.svg" alt="" class="header-logo" width="28" height="28" />
            <span class="brand-text">sunny-pint.co.uk</span>
          </a>
          <button type="button" id="btn-location" class="location-button" title="Change location">
            <span id="location-label">Loading...</span>
            <span class="location-chevron">▾</span>
          </button>
        </div>
      </header>

      <!-- Location overlay (opened by clicking the location button) -->
      <div id="location-overlay" hidden>
        <div class="location-overlay-backdrop"></div>
        <div class="location-overlay-content">
          <button type="button" class="location-overlay-close" aria-label="Close">&times;</button>
          <h3>Change location</h3>
          <button type="button" id="btn-locate" class="location-gps-btn">
            <span id="gps-icon"></span>
            Use my location
          </button>
          <div class="location-search-wrap">
            <input type="search" id="location-search-input" placeholder="Postcode, address or place..." autocomplete="off" />
            <ul id="location-search-results"></ul>
          </div>
        </div>
      </div>

      <!-- Main content -->
      <main id="main">
        <!-- Porthole + controls -->
        <section id="viz">
          <a id="kofi-link" href="https://ko-fi.com/Q5Q11XGHQF" target="_blank" rel="noopener" title="Buy me a pint"><span class="kofi-btn"><img src="/icon.svg" alt="" width="18" height="18" /> Buy me a pint</span></a>
          <div id="circle-wrap">
            <canvas id="circle-canvas"></canvas>
          </div>
          <div id="arc-wrap">
            <canvas id="arc-canvas" height="110"></canvas>
            <div class="arc-controls">
              <div class="arc-left">
                <button type="button" id="btn-play">
                  <span id="play-icon"></span>
                </button>
                <span id="time-display">12:00</span>
                <button type="button" id="btn-now" title="Reset to now">Now</button>
              </div>
              <div class="arc-right">
                <span id="weather-badge" class="weather-badge"></span>
                <button type="button" id="btn-share" title="Share"></button>
                <button type="button" id="btn-directions" title="Get directions"></button>
                <button type="button" id="btn-date">Today</button>
              </div>
              <input type="date" id="date-input" />
            </div>
          </div>

          <!-- Pub info card (selected pub details) -->
          <div id="pub-info" class="pub-info" hidden>
            <div class="pub-info-header">
              <h2 id="pub-info-name"></h2>
              <span id="pub-info-brand" class="pub-info-brand"></span>
            </div>
            <div class="pub-info-grid" id="pub-info-grid"></div>
            <div id="pub-info-hours" class="pub-info-hours"></div>
            <div class="pub-info-links" id="pub-info-links"></div>
          </div>
        </section>

        <!-- Pub list — drawer on mobile, sidebar on desktop -->
        <section id="pubs">
          <div id="pubs-handle" class="pubs-handle">
            <div class="handle-bar"></div>
            <span class="handle-label">Pubs nearby</span>
          </div>
          <div class="search-wrap">
            <span id="search-icon"></span>
            <input id="pub-search" type="search" placeholder="Search pubs..." />
          </div>
          <div class="filter-chips">
            <button type="button" id="filter-open" class="filter-chip">Open now</button>
          </div>
          <ul id="pub-list"></ul>
        </section>
      </main>

      <!-- Footer -->
      <footer id="footer">
        <div class="footer-attr">
          &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors (ODbL) ·
          &copy; <a href="https://carto.com/attributions">CARTO</a> ·
          <a href="/how-it-works.html">How it works</a> ·
          <a href="/attribution.html">Attribution &amp; licences</a>
        </div>
        <div class="footer-right">
          <a href="https://github.com/robertbsmith/sunny-pint" target="_blank" rel="noopener" class="footer-github" title="View source on GitHub" aria-label="GitHub repository">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.73.5.5 5.73.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.11.79-.25.79-.56v-1.97c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.12 3.06.74.81 1.19 1.83 1.19 3.09 0 4.42-2.69 5.39-5.26 5.68.41.36.78 1.06.78 2.14v3.17c0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"/></svg>
          </a>
          <div class="theme-toggle" role="group" aria-label="Theme">
            <button type="button" data-theme="light" title="Light theme">Light</button>
            <button type="button" data-theme="system" title="Match system theme">Auto</button>
            <button type="button" data-theme="dark" title="Dark theme">Dark</button>
          </div>
        </div>
      </footer>

    </div>

    <!-- Fullscreen circle overlay -->
    <div id="circle-fullscreen">
      <canvas id="circle-canvas-big"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
