<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunPub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e}
#map{position:absolute;top:0;left:0;right:320px;bottom:0;transition:opacity .2s}
#panel{position:absolute;top:0;right:0;width:320px;bottom:0;
  background:#fff;overflow-y:auto;display:flex;flex-direction:column;
  border-left:2px solid #e2e8f0}

/* Expanded circle view */
#circle-expanded{position:absolute;top:0;left:0;right:320px;bottom:0;
  background:#f7fafc;display:none;align-items:center;justify-content:center;
  cursor:pointer;z-index:1000}
#circle-expanded canvas{max-width:90%;max-height:90%}
body.circle-mode #circle-expanded{display:flex}
body.circle-mode #map{opacity:0;pointer-events:none}
#panel h1{font-size:1.4rem;padding:16px 16px 4px;color:#1a202c}
#panel .subtitle{padding:0 16px 12px;color:#718096;font-size:.85rem}
section{padding:12px 16px;border-top:1px solid #e2e8f0}
section h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;
  color:#a0aec0;margin-bottom:8px}
button{padding:6px 12px;border:1px solid #cbd5e0;border-radius:6px;
  background:#fff;cursor:pointer;font-size:.85rem;transition:all .15s}
button:hover{background:#edf2f7}
button.active{background:#3182ce;color:#fff;border-color:#3182ce}
input[type=date],input[type=search]{width:100%;padding:6px 10px;
  border:1px solid #cbd5e0;border-radius:6px;font-size:.85rem;margin-bottom:6px}
input[type=range]{width:100%;margin:6px 0}
.time-row{display:flex;align-items:center;gap:8px}
.time-row span{font-size:1.1rem;font-weight:600;min-width:50px;font-variant-numeric:tabular-nums}

/* Pub list */
#pub-list{max-height:180px;overflow-y:auto;margin-top:4px}
.pub-item{padding:5px 8px;cursor:pointer;border-radius:4px;font-size:.85rem;
  display:flex;justify-content:space-between;align-items:center}
.pub-item:hover{background:#edf2f7}
.pub-item.selected{background:#ebf8ff;font-weight:600}
.pub-badge{font-size:.65rem;padding:1px 5px;border-radius:3px;background:#f0fff4;color:#276749}

/* Sun circle */
#sun-circle-wrap{display:flex;justify-content:center;padding:8px 0}
#sun-circle{cursor:pointer}
#sun-pct{text-align:center;font-size:1.3rem;font-weight:700;color:#d69e2e;padding:4px 0;min-height:1.8em}

.pub-tooltip{font-size:.8rem;padding:2px 6px;white-space:nowrap}
#status-bar{padding:8px 16px;background:#fffff0;color:#744210;font-size:.8rem;
  border-top:1px solid #fefcbf;display:none}
#status-bar.show{display:block}
</style>
</head>
<body>
<div id="map"></div>
<div id="circle-expanded"><canvas id="sun-circle-big" width="700" height="780"></canvas></div>
<div id="panel">
  <h1>SunPub</h1>
  <p class="subtitle">Find sunny beer gardens in Norwich</p>

  <section>
    <h3>Pubs</h3>
    <input type="search" id="pub-search" placeholder="Search pubs...">
    <div id="pub-list"></div>
  </section>

  <section id="circle-section" style="display:none">
    <div id="sun-circle-wrap">
      <canvas id="sun-circle" width="260" height="300"></canvas>
    </div>
    <div id="sun-pct"></div>
  </section>

  <section>
    <h3>Date &amp; Time</h3>
    <input type="date" id="date-input">
    <canvas id="sun-arc" width="288" height="110" style="width:100%;cursor:pointer"></canvas>
    <input type="range" id="time-slider" min="0" max="1440" step="5" value="720" style="display:none">
    <div class="time-row">
      <span id="time-display">12:00</span>
      <button id="btn-play">Play</button>
      <button id="btn-now">Now</button>
    </div>
  </section>

  <section>
    <h3>Shadow Filter</h3>
    <label style="font-size:.85rem">Min obstacle height: <b id="min-height-val">6</b>m</label>
    <input type="range" id="min-height" min="0" max="15" step="0.5" value="6">
  </section>

  <section>
    <h3>Debug Layers</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="dbg-btn" data-layer="raw_dsm">Raw LiDAR</button>
      <button class="dbg-btn" data-layer="clean_dsm">Reconstructed</button>
      <button class="dbg-btn" data-layer="ground">Ground</button>
      <button class="dbg-btn" data-layer="">Off</button>
    </div>
    <div id="debug-info" style="font-size:.75rem;color:#a0aec0;margin-top:4px"></div>
  </section>

  <div id="status-bar"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────
const state = {
  pubs: [],
  selectedPub: null,
  pubMarkers: new Map(),
  gardenCircle: null,    // L.Circle on map
  sunMarker: null,       // sun position marker on circle rim
  shadowLayers: [],      // Leaflet polygon layers on map
  shadowPolys: [],       // [[lat,lng],...] for canvas rendering
  buildingHeights: [],   // height in metres per building
  roads: [],             // road data from API
  tileCache: {},         // zoom_x_y → Image for map tile backgrounds
  pubBuildingIdx: -1,    // index into buildings[] of the pub's own building
  buildings: [],         // [[lat,lng],...] polygons from OSM
  buildingLayers: [],    // Leaflet polygon layers on map
  sunPct: null,
  mode: 'pan',
  playing: false,
  playTimer: null,
};

const CIRCLE_RADIUS_M = 60; // metres around pub centre

// ── Map ────────────────────────────────────────────────────────────
const map = L.map('map', {zoomControl: true}).setView([52.6309, 1.2974], 15);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 22, maxNativeZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
});
const sat = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom: 22, maxNativeZoom: 19, attribution: '&copy; Esri'}
);
osm.addTo(map);
L.control.layers({'Street': osm, 'Satellite': sat}).addTo(map);

map.createPane('shadow');
map.getPane('shadow').style.zIndex = 350;

const pubLayer = new L.LayerGroup().addTo(map);

// ── Pubs ───────────────────────────────────────────────────────────
async function loadPubs() {
  const res = await fetch('/api/pubs');
  state.pubs = await res.json();
  renderPubMarkers();
  renderPubList();
}

function renderPubMarkers() {
  pubLayer.clearLayers();
  state.pubMarkers.clear();
  state.pubs.forEach(pub => {
    const color = (pub.beer_garden || pub.outdoor_seating) ? '#d69e2e' : '#a0aec0';
    const marker = L.circleMarker([pub.lat, pub.lng], {
      radius: 5, weight: 1.5, color: '#fff', fillColor: color, fillOpacity: 0.9,
    });
    marker.bindTooltip(pub.name, {className: 'pub-tooltip', direction: 'top', offset: [0, -6]});
    marker.on('click', () => selectPub(pub.id));
    marker.addTo(pubLayer);
    state.pubMarkers.set(pub.id, marker);
  });
}

function renderPubList(filter = '') {
  const el = document.getElementById('pub-list');
  const q = filter.toLowerCase();
  const filtered = q
    ? state.pubs.filter(p => p.name.toLowerCase().includes(q))
    : state.pubs;
  el.innerHTML = '';
  filtered.slice(0, 50).forEach(pub => {
    const div = document.createElement('div');
    div.className = 'pub-item' + (state.selectedPub === pub.id ? ' selected' : '');
    let badge = '';
    if (pub.beer_garden) badge = '<span class="pub-badge">garden</span>';
    div.innerHTML = `<span>${pub.name}</span>${badge}`;
    div.addEventListener('click', () => selectPub(pub.id));
    el.appendChild(div);
  });
}

// ── Select pub ─────────────────────────────────────────────────────
function selectPub(id) {
  const pub = state.pubs.find(p => p.id === id);
  if (!pub) return;
  state.selectedPub = id;

  // Clear previous.
  clearOverlays();

  // Draw circle on map.
  state.gardenCircle = L.circle([pub.lat, pub.lng], {
    radius: CIRCLE_RADIUS_M,
    color: '#3182ce', weight: 2, fillColor: '#ebf8ff', fillOpacity: 0.08,
  }).addTo(map);

  // Zoom to fit circle.
  map.fitBounds(state.gardenCircle.getBounds().pad(0.3), {maxZoom: 19});

  // Highlight marker.
  state.pubMarkers.forEach((m, mid) => {
    m.setStyle({
      radius: mid === id ? 8 : 5,
      weight: mid === id ? 3 : 1.5,
      color: mid === id ? '#3182ce' : '#fff',
    });
  });

  // Show circle section.
  document.getElementById('circle-section').style.display = 'block';

  renderPubList(document.getElementById('pub-search').value);

  // Fetch buildings + heights once for this pub.
  fetchBuildings(pub.lat, pub.lng);
}

function clearOverlays() {
  if (state.gardenCircle) { map.removeLayer(state.gardenCircle); state.gardenCircle = null; }
  if (state.sunMarker) { map.removeLayer(state.sunMarker); state.sunMarker = null; }
  if (debugOverlay) { map.removeLayer(debugOverlay); debugOverlay = null; }
  state.shadowLayers.forEach(l => map.removeLayer(l));
  state.shadowLayers = [];
  state.shadowPolys = [];
  state.buildingLayers.forEach(l => map.removeLayer(l));
  state.buildingLayers = [];
  state.buildings = [];
  state.buildingHeights = [];
  state.roads = [];
  state.pubBuildingIdx = -1;
  clearDebugCache();
}

// ── Sun position ───────────────────────────────────────────────────
function getDateTime() {
  const d = document.getElementById('date-input').value;
  const mins = parseInt(document.getElementById('time-slider').value);
  const dt = new Date(d + 'T00:00:00');
  dt.setMinutes(mins);
  return dt;
}

function getPubCenter() {
  const pub = state.pubs.find(p => p.id === state.selectedPub);
  return pub ? {lat: pub.lat, lng: pub.lng} : {lat: 52.6309, lng: 1.2974};
}

function getSunPos() {
  const dt = getDateTime();
  const c = getPubCenter();
  const pos = SunCalc.getPosition(dt, c.lat, c.lng);
  const az = ((pos.azimuth * 180 / Math.PI) + 180) % 360;
  const alt = pos.altitude * 180 / Math.PI;
  return {az, alt};
}

function getSunTimes() {
  const dt = getDateTime();
  const c = getPubCenter();
  return SunCalc.getTimes(dt, c.lat, c.lng);
}

function updateSunDisplay() {
  const {az, alt} = getSunPos();
  const mins = parseInt(document.getElementById('time-slider').value);
  const hh = String(Math.floor(mins / 60)).padStart(2, '0');
  const mm = String(mins % 60).padStart(2, '0');
  document.getElementById('time-display').textContent = hh + ':' + mm;

  updateSunMarker();
  drawCircle();
}

// ── Sun marker on map circle rim ───────────────────────────────────
function updateSunMarker() {
  if (state.sunMarker) { map.removeLayer(state.sunMarker); state.sunMarker = null; }
  if (!state.gardenCircle) return;
  const {az, alt} = getSunPos();
  if (alt <= 0) return;

  const c = getPubCenter();
  const azRad = az * Math.PI / 180;
  const r = CIRCLE_RADIUS_M;
  // Offset in metres → approx lat/lng
  const dLat = (r * Math.cos(azRad)) / 111320;
  const dLng = (r * Math.sin(azRad)) / (111320 * Math.cos(c.lat * Math.PI / 180));

  const sunIcon = L.divIcon({
    className: '',
    html: `<div style="width:22px;height:22px;border-radius:50%;background:#F59E0B;
      border:2px solid #D97706;box-shadow:0 0 8px rgba(245,158,11,0.5);
      display:flex;align-items:center;justify-content:center;font-size:12px">☀</div>`,
    iconSize: [22, 22], iconAnchor: [11, 11],
  });
  state.sunMarker = L.marker([c.lat + dLat, c.lng + dLng], {icon: sunIcon}).addTo(map);
}

// ── Canvas circle view ─────────────────────────────────────────────
function drawCircle() {
  _drawCircleOn(document.getElementById('sun-circle'));
  _drawCircleOn(document.getElementById('sun-circle-big'));
}

// ── Map tile loader for canvas background ─────────────────────────
function _lngToTileX(lng, z) { return Math.floor((lng + 180) / 360 * (1 << z)); }
function _latToTileY(lat, z) {
  const r = lat * Math.PI / 180;
  return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * (1 << z));
}
function _tileToLng(x, z) { return x / (1 << z) * 360 - 180; }
function _tileToLat(y, z) {
  const n = Math.PI - 2 * Math.PI * y / (1 << z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

function _loadTile(z, x, y) {
  const key = `${z}_${x}_${y}`;
  if (state.tileCache[key]) return state.tileCache[key];
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `https://cartodb-basemaps-a.global.ssl.fastly.net/rastertiles/voyager_labels_under/${z}/${x}/${y}.png`;
  img.onload = () => drawCircle(); // redraw when tile arrives
  state.tileCache[key] = img;
  return img;
}

function _drawMapTiles(ctx, cx, cy, r, center, pxPerM, mPerDeg, cosLat, W, H) {
  const z = 18; // high zoom for detail
  const tileX = _lngToTileX(center.lng, z);
  const tileY = _latToTileY(center.lat, z);

  // Load a 3x3 grid of tiles to cover the circle.
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const tx = tileX + dx;
      const ty = tileY + dy;
      const img = _loadTile(z, tx, ty);
      if (!img.complete || !img.naturalWidth) continue;

      // Tile bounds in lat/lng.
      const tileW = _tileToLng(tx, z);
      const tileN = _tileToLat(ty, z);
      const tileE = _tileToLng(tx + 1, z);
      const tileS = _tileToLat(ty + 1, z);

      // Convert to canvas coords.
      const x1 = cx + (tileW - center.lng) * mPerDeg * cosLat * pxPerM;
      const y1 = cy - (tileN - center.lat) * mPerDeg * pxPerM;
      const x2 = cx + (tileE - center.lng) * mPerDeg * cosLat * pxPerM;
      const y2 = cy - (tileS - center.lat) * mPerDeg * pxPerM;

      ctx.drawImage(img, x1, y1, x2 - x1, y2 - y1);
    }
  }
}

function _drawCircleOn(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const big = W >= 400;
  const cx = W / 2;
  const cy = H / 2 + (big ? 10 : 8);
  const r = Math.min(W, H) / 2 - (big ? 55 : 38);
  const pub = state.pubs.find(p => p.id === state.selectedPub);
  const {az, alt} = getSunPos();
  const c = getPubCenter();
  const mPerDeg = 111320;
  const cosLat = Math.cos(c.lat * Math.PI / 180);
  const pxPerM = r / CIRCLE_RADIUS_M;
  const isNight = alt <= 0;

  ctx.clearRect(0, 0, W, H);

  function toXY(lat, lng) {
    return [
      cx + (lng - c.lng) * mPerDeg * cosLat * pxPerM,
      cy - (lat - c.lat) * mPerDeg * pxPerM,
    ];
  }

  // ── Porthole bezel (drawn first, content goes on top) ──
  const bezel = big ? 18 : 10;
  const outerR = r + bezel;

  // Bezel gradient ring.
  const bGrad = ctx.createRadialGradient(cx - outerR * 0.3, cy - outerR * 0.3, 0,
                                          cx, cy, outerR);
  if (isNight) {
    bGrad.addColorStop(0, '#4A5568');
    bGrad.addColorStop(1, '#1A202C');
  } else {
    bGrad.addColorStop(0, '#E2E8F0');
    bGrad.addColorStop(0.7, '#CBD5E0');
    bGrad.addColorStop(1, '#94A3B8');
  }
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, 2 * Math.PI);
  ctx.fillStyle = bGrad;
  ctx.fill();

  // ── Content area (clipped to inner circle) ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.clip();

  // Map tile background.
  _drawMapTiles(ctx, cx, cy, r, c, pxPerM, mPerDeg, cosLat, W, H);

  // Night/twilight tint.
  if (isNight) {
    ctx.fillStyle = 'rgba(26,26,46,0.75)';
    ctx.fillRect(0, 0, W, H);
  } else if (alt < 8) {
    ctx.fillStyle = `rgba(26,26,46,${(1 - alt / 8) * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Shadow polygons.
  if (!isNight && state.shadowPolys.length) {
    const shadowAlpha = Math.min(alt / 8, 0.5);
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const ox = off.getContext('2d');
    ox.beginPath();
    ox.arc(cx, cy, r, 0, 2 * Math.PI);
    ox.clip();
    ox.fillStyle = '#1E1E3C';
    state.shadowPolys.forEach(coords => {
      ox.beginPath();
      coords.forEach((pt, i) => {
        const [px, py] = toXY(pt[0], pt[1]);
        if (i === 0) ox.moveTo(px, py); else ox.lineTo(px, py);
      });
      ox.fill();
    });
    ctx.globalAlpha = shadowAlpha;
    ctx.drawImage(off, 0, 0);
    ctx.globalAlpha = 1;
  }

  // Buildings — pub building in warm colour, others grey.
  if (state.buildings.length) {
    const normalFill = isNight ? 'rgba(40,40,60,0.9)' : 'rgba(140,150,165,0.85)';
    const normalStroke = isNight ? '#4A5568' : '#6B7280';
    const pubFill = isNight ? 'rgba(180,100,50,0.7)' : 'rgba(217,119,6,0.65)';
    const pubStroke = isNight ? '#B45C32' : '#B45309';
    ctx.lineWidth = big ? 1.5 : 0.8;

    state.buildings.forEach((coords, idx) => {
      const isPub = idx === state.pubBuildingIdx;
      ctx.fillStyle = isPub ? pubFill : normalFill;
      ctx.strokeStyle = isPub ? pubStroke : normalStroke;
      ctx.lineWidth = isPub ? (big ? 2.5 : 1.5) : (big ? 1.5 : 0.8);
      ctx.beginPath();
      coords.forEach((pt, i) => {
        const [px, py] = toXY(pt[0], pt[1]);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });
  }

  // Outdoor area of selected pub (green highlight).
  if (pub && pub.outdoor && pub.outdoor.length >= 3) {
    ctx.fillStyle = isNight ? 'rgba(39,174,96,0.12)' : 'rgba(39,174,96,0.18)';
    ctx.strokeStyle = '#27AE60';
    ctx.lineWidth = big ? 2 : 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    pub.outdoor.forEach((pt, i) => {
      const [px, py] = toXY(pt[0], pt[1]);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Pub marker dot.
  ctx.beginPath();
  ctx.arc(cx, cy, big ? 5 : 3, 0, 2 * Math.PI);
  ctx.fillStyle = '#E53E3E';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore();

  // Inner rim highlight.
  ctx.beginPath();
  ctx.arc(cx, cy, r + 0.5, 0, 2 * Math.PI);
  ctx.strokeStyle = isNight ? '#1A202C' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── Compass ticks + labels on bezel ──
  const tickInner = r + 2;
  const tickOuter = r + bezel * 0.5;
  const labelR = outerR + (big ? 12 : 8);
  const tickCol = isNight ? '#4A5568' : '#94A3B8';

  // 8 minor ticks.
  for (let i = 0; i < 8; i++) {
    const a = (i * 45 - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + tickInner * Math.cos(a), cy + tickInner * Math.sin(a));
    ctx.lineTo(cx + tickOuter * Math.cos(a), cy + tickOuter * Math.sin(a));
    ctx.strokeStyle = tickCol;
    ctx.lineWidth = i % 2 === 0 ? 2 : 1;
    ctx.stroke();
  }

  // Cardinal labels — centred in bezel band.
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const dirs = [{a: -90, l: 'N'}, {a: 0, l: 'E'}, {a: 90, l: 'S'}, {a: 180, l: 'W'}];
  dirs.forEach(({a, l}) => {
    const rad = a * Math.PI / 180;
    const lx = cx + labelR * Math.cos(rad);
    const ly = cy + labelR * Math.sin(rad);
    // Text shadow for contrast.
    ctx.font = `bold ${big ? 14 : 10}px system-ui`;
    ctx.fillStyle = isNight ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.7)';
    ctx.fillText(l, lx + 0.5, ly + 0.5);
    ctx.fillStyle = l === 'N' ? '#E53E3E' : (isNight ? '#A0AEC0' : '#475569');
    ctx.fillText(l, lx, ly);
  });

  // ── Sun/moon icon on bezel ──
  const iconR = r + bezel * 0.5;
  if (!isNight) {
    const sunRad = (az - 90) * Math.PI / 180;
    const sx = cx + iconR * Math.cos(sunRad);
    const sy = cy + iconR * Math.sin(sunRad);
    const sr = big ? 9 : 6;
    const glow = ctx.createRadialGradient(sx, sy, sr * 0.3, sx, sy, sr * 2);
    glow.addColorStop(0, 'rgba(245,158,11,0.7)');
    glow.addColorStop(1, 'rgba(245,158,11,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(sx - sr * 2, sy - sr * 2, sr * 4, sr * 4);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, 2 * Math.PI);
    ctx.fillStyle = '#F59E0B';
    ctx.fill();
    ctx.strokeStyle = '#D97706';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    const moonRad = (az - 90) * Math.PI / 180;
    const mx = cx + iconR * Math.cos(moonRad);
    const my = cy + iconR * Math.sin(moonRad);
    const mr = big ? 7 : 5;
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, 2 * Math.PI);
    ctx.fillStyle = '#94A3B8';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mx + mr * 0.3, my - mr * 0.15, mr * 0.72, 0, 2 * Math.PI);
    ctx.fillStyle = isNight ? '#2D3748' : '#E2E8F0';
    ctx.fill();
  }

  // ── Info overlays ──
  const mins = parseInt(document.getElementById('time-slider').value);
  const hh = String(Math.floor(mins / 60)).padStart(2, '0');
  const mm = String(mins % 60).padStart(2, '0');

  // Sun % inside the circle.
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (isNight) {
    ctx.font = `${big ? 18 : 11}px system-ui`;
    ctx.fillStyle = '#64748B';
    ctx.fillText('\u263D', cx, cy - r + (big ? 20 : 12));
  } else if (state.sunPct !== null) {
    ctx.font = `bold ${big ? 24 : 12}px system-ui`;
    ctx.fillStyle = 'rgba(214,158,46,0.9)';
    ctx.fillText(state.sunPct + '%', cx, cy - r + (big ? 22 : 13));
  }

  // Pub name above the circle, centred.
  if (pub) {
    ctx.font = `bold ${big ? 16 : 10}px system-ui`;
    ctx.fillStyle = isNight ? '#94A3B8' : '#2D3748';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(pub.name, cx, cy - outerR - (big ? 16 : 10));
  }

  // Time curved along outside of bezel, arcing up over cardinal labels.
  const timeStr = hh + ':' + mm;
  const sunAngle = (az - 90) * Math.PI / 180;
  const baseTextR = outerR + (big ? 8 : 5);
  const bumpR = big ? 16 : 10; // extra radius to clear N/S/E/W
  const charSpacing = (big ? 9 : 6) / baseTextR;
  const cardinals = [-Math.PI/2, 0, Math.PI/2, Math.PI, -Math.PI];

  function textRadiusAt(angle) {
    if (!state.playing) return baseTextR; // settled: constant radius
    let minDist = Math.PI;
    for (const c of cardinals) {
      let d = Math.abs(angle - c);
      if (d > Math.PI) d = 2 * Math.PI - d;
      if (d < minDist) minDist = d;
    }
    const t = Math.max(0, 1 - minDist / 0.5);
    const smooth = t * t * (3 - 2 * t);
    return baseTextR + smooth * bumpR;
  }

  ctx.font = `bold ${big ? 12 : 8}px system-ui`;
  ctx.fillStyle = isNight ? '#64748B' : '#4A5568';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const startAngle = sunAngle - (timeStr.length - 1) * charSpacing / 2;
  for (let i = 0; i < timeStr.length; i++) {
    const a = startAngle + i * charSpacing;
    const tr = textRadiusAt(a);
    const tx = cx + tr * Math.cos(a);
    const ty = cy + tr * Math.sin(a);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(a + Math.PI / 2);
    ctx.fillText(timeStr[i], 0, 0);
    ctx.restore();
  }
}

function _updateSunPctText() {
  const {alt} = getSunPos();
  const el = document.getElementById('sun-pct');
  if (state.sunPct !== null) {
    el.textContent = state.sunPct + '% in sun';
  } else {
    el.textContent = alt <= 0 ? '\u263D' : '';
  }
}

function _pointInPoly(lat, lng, coords) {
  let inside = false;
  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const [yi, xi] = coords[i], [yj, xj] = coords[j];
    if ((xi > lng) !== (xj > lng) &&
        lat < (yj - yi) * (lng - xi) / (xj - xi) + yi)
      inside = !inside;
  }
  return inside;
}

// ── Building data (fetched once per pub) ───────────────────────────
async function fetchBuildings(lat, lng) {
  try {
    const res = await fetch('/api/buildings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        lat, lng,
        radius: CIRCLE_RADIUS_M,
        min_height: parseFloat(document.getElementById('min-height').value),
      }),
    });
    const data = await res.json();

    state.buildings = data.buildings || [];
    state.buildingHeights = data.heights || [];
    state.roads = (data.roads || []);

    // Identify which building the pub is inside.
    const pubC = getPubCenter();
    state.pubBuildingIdx = -1;
    for (let i = 0; i < state.buildings.length; i++) {
      if (_pointInPoly(pubC.lat, pubC.lng, state.buildings[i])) {
        state.pubBuildingIdx = i;
        break;
      }
    }

    // Draw buildings on map.
    state.buildingLayers.forEach(l => map.removeLayer(l));
    state.buildingLayers = [];
    state.buildings.forEach(coords => {
      const poly = L.polygon(coords.map(c => [c[0], c[1]]), {
        color: '#6B7280', weight: 0.5, fillColor: '#9CA3AF',
        fillOpacity: 0.7, interactive: false,
      }).addTo(map);
      state.buildingLayers.push(poly);
    });

    // Now render with current time.
    updateSunDisplay();
    computeAndRender();
  } catch (err) {
    console.error('building fetch failed', err);
  }
}

// ── Client-side shadow computation ─────────────────────────────────
function computeShadows(buildings, heights, azDeg, altDeg) {
  if (altDeg <= 0 || !buildings.length) return [];

  const azRad = azDeg * Math.PI / 180;
  const tanAlt = Math.tan(altDeg * Math.PI / 180);
  const c = getPubCenter();
  const M_LAT = 111320;
  const M_LNG = 111320 * Math.cos(c.lat * Math.PI / 180);

  const quads = []; // All shadow quadrilaterals as [lat,lng] arrays.

  for (let b = 0; b < buildings.length; b++) {
    const coords = buildings[b];
    const h = heights[b];
    if (h <= 0 || coords.length < 3) continue;

    const shadowLen = Math.min(h / tanAlt, 200);
    const dlat = -shadowLen * Math.cos(azRad) / M_LAT;
    const dlng = -shadowLen * Math.sin(azRad) / M_LNG;

    // Each wall segment → shadow quad.
    for (let i = 0; i < coords.length - 1; i++) {
      const [y1, x1] = coords[i];
      const [y2, x2] = coords[i + 1];
      quads.push([
        [y1, x1], [y2, x2],
        [y2 + dlat, x2 + dlng], [y1 + dlat, x1 + dlng],
      ]);
    }
    // Projected footprint.
    quads.push(coords.map(c => [c[0] + dlat, c[1] + dlng]));
    // Original footprint (roof shadow).
    quads.push(coords);
  }
  return quads;
}

function computeAndRender(updateMap = true) {
  const mins = parseInt(document.getElementById('time-slider').value);
  const hh = String(Math.floor(mins / 60)).padStart(2, '0');
  const mm = String(mins % 60).padStart(2, '0');
  document.getElementById('time-display').textContent = hh + ':' + mm;

  const {az, alt} = getSunPos();

  state.shadowPolys = computeShadows(
    state.buildings, state.buildingHeights, az, alt
  );

  // Canvas circle — always update (fast).
  drawCircle();
  _updateSunPctText();
  updateSunMarker();

  // Map shadows — skip during play for performance.
  if (updateMap && !state.playing) {
    _updateMapShadows(alt);
  }
}

function _updateMapShadows(alt) {
  state.shadowLayers.forEach(l => map.removeLayer(l));
  state.shadowLayers = [];
  if (state.shadowPolys.length && alt > 0) {
    const shadowOpacity = Math.min(alt / 8, 0.5);
    state.shadowPolys.forEach(coords => {
      const poly = L.polygon(coords.map(c => [c[0], c[1]]), {
        color: 'transparent', weight: 0,
        fillColor: '#1E1E3C', fillOpacity: shadowOpacity,
        interactive: false, pane: 'shadow',
      }).addTo(map);
      state.shadowLayers.push(poly);
    });
  }
}

// ── Sun arc time control ───────────────────────────────────────────
function drawSunArc() {
  const canvas = document.getElementById('sun-arc');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const pad = 20;
  const arcW = W - pad * 2;
  const arcH = H - pad - 10;

  ctx.clearRect(0, 0, W, H);

  const c = getPubCenter();
  const dateStr = document.getElementById('date-input').value;
  const baseDate = new Date(dateStr + 'T00:00:00');
  const times = SunCalc.getTimes(baseDate, c.lat, c.lng);

  const sunriseMin = times.sunrise.getHours() * 60 + times.sunrise.getMinutes();
  const sunsetMin = times.sunset.getHours() * 60 + times.sunset.getMinutes();
  const currentMin = parseInt(document.getElementById('time-slider').value);
  const isDay = currentMin >= sunriseMin && currentMin <= sunsetMin;

  // Compute arc points (sunrise to sunset only).
  const points = [];
  let maxAlt = 0;
  for (let m = sunriseMin; m <= sunsetMin; m += 3) {
    const dt = new Date(baseDate);
    dt.setMinutes(m);
    const pos = SunCalc.getPosition(dt, c.lat, c.lng);
    const alt = Math.max(pos.altitude * 180 / Math.PI, 0);
    if (alt > maxAlt) maxAlt = alt;
    points.push({min: m, alt});
  }
  if (maxAlt <= 0) return;

  function toX(min) { return pad + (min - sunriseMin) / (sunsetMin - sunriseMin) * arcW; }
  function toY(alt) { return H - pad - (alt / maxAlt) * arcH; }

  // Background transitions to night colour at the extremes.
  const dayFrac = isDay ? Math.min(getSunPos().alt / 8, 1) : 0;
  const bgR = Math.round(26 + (255 - 26) * dayFrac);
  const bgG = Math.round(26 + (255 - 26) * dayFrac);
  const bgB = Math.round(46 + (255 - 46) * dayFrac);
  ctx.fillStyle = `rgba(${bgR},${bgG},${bgB},0.06)`;
  ctx.fillRect(0, 0, W, H);

  // Horizon line.
  ctx.strokeStyle = isDay ? '#E2E8F0' : '#4A5568';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad, H - pad);
  ctx.lineTo(W - pad, H - pad);
  ctx.stroke();

  // Fill under curve.
  const fillAlpha = isDay ? 0.25 : 0.08;
  ctx.fillStyle = isDay ? `rgba(254,243,199,${fillAlpha})` : `rgba(100,116,139,${fillAlpha})`;
  ctx.beginPath();
  ctx.moveTo(toX(sunriseMin), toY(0));
  points.forEach(p => ctx.lineTo(toX(p.min), toY(p.alt)));
  ctx.lineTo(toX(sunsetMin), toY(0));
  ctx.closePath();
  ctx.fill();

  // Arc curve.
  ctx.strokeStyle = isDay ? '#F59E0B' : '#64748B';
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = toX(p.min), y = toY(p.alt);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Sun position on arc.
  const clampedMin = Math.max(sunriseMin, Math.min(sunsetMin, currentMin));
  const dt = new Date(baseDate);
  dt.setMinutes(clampedMin);
  const curAlt = Math.max(SunCalc.getPosition(dt, c.lat, c.lng).altitude * 180 / Math.PI, 0);
  const sx = toX(clampedMin);
  const sy = toY(curAlt);

  // Vertical time line.
  ctx.strokeStyle = isDay ? 'rgba(245,158,11,0.3)' : 'rgba(100,116,139,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx, H - pad);
  ctx.stroke();

  if (isDay) {
    // Sun glow + dot.
    const glow = ctx.createRadialGradient(sx, sy, 3, sx, sy, 12);
    glow.addColorStop(0, 'rgba(245,158,11,0.6)');
    glow.addColorStop(1, 'rgba(245,158,11,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(sx - 12, sy - 12, 24, 24);
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#F59E0B';
    ctx.fill();
    ctx.strokeStyle = '#D97706';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    // Moon at the nearest end of the arc.
    const moonX = currentMin < sunriseMin ? toX(sunriseMin) : toX(sunsetMin);
    const moonY = toY(0);
    ctx.beginPath();
    ctx.arc(moonX, moonY, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#94A3B8';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX + 2.5, moonY - 1, 5, 0, 2 * Math.PI);
    ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
    ctx.fill();
  }

  // Sunrise/sunset labels.
  ctx.fillStyle = '#A0AEC0';
  ctx.font = '9px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const fmt = m => String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
  ctx.fillText(fmt(sunriseMin), pad, H - pad + 3);
  ctx.fillText(fmt(sunsetMin), W - pad, H - pad + 3);

  // Current time label.
  ctx.font = 'bold 11px system-ui';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = isDay ? '#4A5568' : '#64748B';
  ctx.fillText(document.getElementById('time-display').textContent, sx, sy - 8);
}

// Sun arc click/drag interaction.
(function() {
  const canvas = document.getElementById('sun-arc');
  let dragging = false;

  function setTimeFromX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (clientX - rect.left) * scaleX;
    const pad = 20;
    const arcW = canvas.width - pad * 2;

    const c = getPubCenter();
    const dateStr = document.getElementById('date-input').value;
    const baseDate = new Date(dateStr + 'T00:00:00');
    const times = SunCalc.getTimes(baseDate, c.lat, c.lng);
    const sunriseMin = times.sunrise.getHours() * 60 + times.sunrise.getMinutes();
    const sunsetMin = times.sunset.getHours() * 60 + times.sunset.getMinutes();

    const frac = Math.max(0, Math.min(1, (x - pad) / arcW));
    const min = Math.round((sunriseMin + frac * (sunsetMin - sunriseMin)) / 5) * 5;
    document.getElementById('time-slider').value = min;
    computeAndRender(false);
    drawSunArc();
  }

  canvas.addEventListener('mousedown', e => { dragging = true; setTimeFromX(e.clientX); });
  canvas.addEventListener('mousemove', e => { if (dragging) setTimeFromX(e.clientX); });
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; _updateMapShadows(getSunPos().alt); }
  });
  // Touch support.
  canvas.addEventListener('touchstart', e => { dragging = true; setTimeFromX(e.touches[0].clientX); e.preventDefault(); });
  canvas.addEventListener('touchmove', e => { if (dragging) { setTimeFromX(e.touches[0].clientX); e.preventDefault(); } });
  canvas.addEventListener('touchend', () => { if (dragging) { dragging = false; _updateMapShadows(getSunPos().alt); } });
})();

// Redraw arc whenever shadows update.
const _origComputeAndRender = computeAndRender;
computeAndRender = function(updateMap) {
  _origComputeAndRender(updateMap);
  drawSunArc();
};

// ── Play — sunrise to sunset, loop ─────────────────────────────────
function togglePlay() {
  if (state.playing) {
    cancelAnimationFrame(state.playTimer);
    state.playing = false;
    document.getElementById('btn-play').textContent = 'Play';
    _updateMapShadows(getSunPos().alt);
    return;
  } else {
    state.playing = true;
    document.getElementById('btn-play').textContent = 'Stop';

    const times = getSunTimes();
    const sunrise = times.sunrise.getHours() * 60 + times.sunrise.getMinutes();
    const sunset = times.sunset.getHours() * 60 + times.sunset.getMinutes();

    // If at or past sunset, reset to sunrise.
    const cur = parseInt(document.getElementById('time-slider').value);
    if (cur >= sunset) {
      document.getElementById('time-slider').value = sunrise;
      computeAndRender();
    }

    let lastFrame = performance.now();
    const speed = 120; // minutes per second — full day in ~7 seconds

    function animate(now) {
      if (!state.playing) return;
      const dt = (now - lastFrame) / 1000; // seconds elapsed
      lastFrame = now;

      const slider = document.getElementById('time-slider');
      let v = parseFloat(slider.value) + speed * dt;
      if (v >= sunset) {
        slider.value = sunset;
        computeAndRender();
        _updateMapShadows(getSunPos().alt);
        state.playing = false;
        document.getElementById('btn-play').textContent = 'Play';
        return;
      }
      slider.value = v;
      computeAndRender();
      state.playTimer = requestAnimationFrame(animate);
    }
    state.playTimer = requestAnimationFrame(animate);
  }
}

// ── Status ─────────────────────────────────────────────────────────
function showStatus(msg) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.classList.add('show');
}

// ── Circle expand/collapse ─────────────────────────────────────────
document.getElementById('sun-circle').addEventListener('click', () => {
  document.body.classList.add('circle-mode');
  drawCircle();
});
document.getElementById('circle-expanded').addEventListener('click', () => {
  document.body.classList.remove('circle-mode');
});

// ── Debug layers ───────────────────────────────────────────────────
let debugOverlay = null;
let debugCache = null;

document.querySelectorAll('.dbg-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const layer = btn.dataset.layer;
    // Remove existing overlay.
    if (debugOverlay) { map.removeLayer(debugOverlay); debugOverlay = null; }
    document.querySelectorAll('.dbg-btn').forEach(b => b.classList.remove('active'));

    if (!layer) {
      document.getElementById('debug-info').textContent = '';
      return;
    }
    btn.classList.add('active');

    // Fetch debug data if not cached.
    if (!debugCache && state.gardenCircle) {
      const c = getPubCenter();
      const dLat = CIRCLE_RADIUS_M / 111320;
      const dLng = CIRCLE_RADIUS_M / (111320 * Math.cos(c.lat * Math.PI / 180));
      const res = await fetch('/api/debug', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          north: c.lat + dLat, south: c.lat - dLat,
          east: c.lng + dLng, west: c.lng - dLng,
          min_height: parseFloat(document.getElementById('min-height').value),
        }),
      });
      debugCache = await res.json();
    }
    if (!debugCache || !debugCache.layers) return;

    const imgData = debugCache.layers[layer];
    if (!imgData) return;

    const url = 'data:image/png;base64,' + imgData;
    const bnds = L.latLngBounds(debugCache.bounds);
    debugOverlay = L.imageOverlay(url, bnds, {opacity: 0.8}).addTo(map);

    document.getElementById('debug-info').textContent = 'Showing: ' + layer;
  });
});

// Clear debug cache when pub changes.
function clearDebugCache() { debugCache = null; }

// ── Events ─────────────────────────────────────────────────────────
document.getElementById('pub-search').addEventListener('input', e => renderPubList(e.target.value));
document.getElementById('date-input').addEventListener('change', () => computeAndRender(true));
document.getElementById('time-slider').addEventListener('input', () => computeAndRender(false));
document.getElementById('time-slider').addEventListener('change', () => _updateMapShadows(getSunPos().alt));
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('min-height').addEventListener('input', e => {
  document.getElementById('min-height-val').textContent = e.target.value;
  computeAndRender();
});
document.getElementById('btn-now').addEventListener('click', () => {
  const now = new Date();
  document.getElementById('date-input').value = now.toISOString().slice(0, 10);
  document.getElementById('time-slider').value = now.getHours() * 60 + now.getMinutes();
  updateSunDisplay();
  computeAndRender();
});

// ── Init ───────────────────────────────────────────────────────────
(function init() {
  const now = new Date();
  document.getElementById('date-input').value = now.toISOString().slice(0, 10);
  document.getElementById('time-slider').value = now.getHours() * 60 + now.getMinutes();
  updateSunDisplay();
  loadPubs();
  fetch('/api/status').then(r => r.json()).then(d => {
    if (!d.has_lidar) showStatus('No LiDAR data. Run: uv run python scripts/download_lidar.py');
  });
})();
</script>
