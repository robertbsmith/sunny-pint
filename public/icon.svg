<!--
  Concept 6: Map pin with pint glass + shadow.
  Refinement of the user's original idea: the shadow now starts exactly
  at the glass base (full base width = 58→70 at y=86), curves out from
  there along soft cubic edges, and fans out at the same down-right
  angle as before.

  Glass base geometry:
    The glass tapers from x=52..76 at y=40 down to x=54..70 at y=82,
    finishing the rounded base at (58, 86) and (70, 86) — those two
    points are the shadow's attachment line.
-->
<svg width="120" height="120" viewBox="12 20 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="pin">
      <path d="M 64 16 C 94 16 112 38 112 64 C 112 96 64 128 64 128 C 64 128 16 96 16 64 C 16 38 34 16 64 16 Z"/>
    </clipPath>
  </defs>
  <g transform="translate(8,8)">
    <!-- Pin background -->
    <rect x="0" y="0" width="128" height="128" fill="#F4B73C" clip-path="url(#pin)"/>

    <!-- Shadow polygon. The top edge traces the glass's bottom outline
         pixel-for-pixel — same Q corners and same L base — so the
         shadow tucks under the glass with no gap or angle change at
         the join. From the right corner (74,82) the polygon then
         extends out at slope 0.5 (≈27°) to (140,115); the pin clip
         crops the right line where it exits the pin and the pin's
         own curve forms the shadow's bottom from there to the tip
         (64,128). Closing line from the tip back to (54,82) is the
         straight left edge of the shadow. -->
    <g clip-path="url(#pin)">
      <path d="M 54 82
               Q 54 86 58 86
               L 70 86
               Q 74 86 74 82
               L 140 115
               L 64 128
               Z"
            fill="#2B3B4A"/>
    </g>

    <!-- Pint glass + foam -->
    <g clip-path="url(#pin)">
      <path d="M 52 40 L 76 40 L 74 82 Q 74 86 70 86 L 58 86 Q 54 86 54 82 Z"
            fill="#FFFFFF" stroke="#1C1410" stroke-width="2.25" stroke-linejoin="round"/>
      <rect x="52" y="40" width="24" height="5" fill="#1C1410"/>
    </g>

    <!-- Pin outline -->
    <path d="M 64 16 C 94 16 112 38 112 64 C 112 96 64 128 64 128 C 64 128 16 96 16 64 C 16 38 34 16 64 16 Z"
          fill="none" stroke="#1C1410" stroke-width="2.75" stroke-linejoin="round"/>
  </g>
</svg>
